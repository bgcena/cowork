<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello, it deploys!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 3rem 4rem;
      background: #1e293b;
      border-radius: 1.5rem;
      border: 1px solid #334155;
      max-width: 520px;
    }
    .badge {
      display: inline-block;
      background: #22c55e;
      color: #052e16;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }
    h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 0.75rem; }
    p { color: #94a3b8; margin-bottom: 1.5rem; line-height: 1.6; }
    .stack {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .tag {
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 0.5rem;
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .footer { margin-top: 2rem; font-size: 0.75rem; color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">✓ Live</div>
    <h1>Hello, it deploys!</h1>
    <p>This page was pushed from a Git repo and deployed automatically via Coolify on your Linode VM.</p>
    <div class="stack">
      <span class="tag">Coolify</span>
      <span class="tag">Nixpacks</span>
      <span class="tag">Let's Encrypt</span>
      <span class="tag">GitHub Auto-Deploy</span>
    </div>
    <div class="footer">git push → build → live &nbsp;|&nbsp; No more manual deploys.</div>
  </div>
</body>
</html>
